<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodExpress - Create Account</title>
    <link rel="stylesheet" href="regStyles.css">
</head>
<body>

    <div class="video-background">
        <video autoplay loop muted playsinline>
            <source src="assets/pizz.mp4.mp4" type="video/mp4">
        </video>
    </div>

    <div class="register-container">
        <h2 class="gradient-text">Get Started</h2>
        <p class="subtitle">Create an account to explore premium tastes</p>

        <form action="RegisterServlet" method="POST">
            
            <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" name="userName" placeholder="Full name" required>
            </div>

            <div class="input-wrapper">
                <span class="input-icon">✉</span>
                <input type="email" name="email" placeholder="Email address" required>
            </div>


            <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" name="password" id="pwdField" placeholder="Password" minlength="6" required>
                <button type="button" class="eye-btn" onclick="togglePwd()">👁</button>
            </div>

            <div class="input-wrapper select-wrapper">
                <span class="input-icon">🛡️</span>
                <select name="role" required>
                    <option value="" disabled selected hidden>Select account role</option>
                    <option value="Customer">Customer</option>
                    <option value="Restaurant Owner">Restaurant Owner</option>
                    <option value="Delivery Partner">Delivery Partner</option>
                </select>
            </div>

            <div class="input-wrapper textarea-wrapper">
                <span class="input-icon textarea-icon">📍</span>
                <textarea name="address" placeholder="Full delivery address details..." required></textarea>
            </div>

            <button type="submit" class="cart-btn">Sign Up</button>
        </form>

        <div class="divider"><span>or</span></div>

        <button class="google-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign up with Google
        </button>

        <div class="signup-box">
            <p class="signup-link">Already have an account? <a href="login.html" class="gradient-link">Sign in here</a></p>
        </div>
    </div>

    <script>
        function togglePwd() {
            const f = document.getElementById('pwdField');
            f.type = f.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
